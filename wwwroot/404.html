    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/site.css" />
    <link rel="stylesheet" href="WayfinderProject.styles.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />

<body>
    <div id="app">
        
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

    <script type="text/javascript">
        function isDevice() {
            return /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile/i.test(navigator.userAgent);
        }

        function getSelections(id) {
            var options = document.getElementById(id).selectedOptions;

            return Array.from(options).map(({ value }) => value);
        }

        window.isHidden = function (el, pEl) {
            let contBound = pEl.getBoundingClientRect();
            let w = el.scrollWidth;

            return { 'width': w, 'boundingWidth': contBound.width };
        }
    </script>

    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</body>
